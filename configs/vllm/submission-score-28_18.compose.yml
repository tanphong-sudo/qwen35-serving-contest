services:
  model:
    image: vllm/vllm-openai:v0.22.1
    environment:
      VLLM_NO_USAGE_STATS: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      PYTHONUNBUFFERED: "1"
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=Qwen3.5-2B
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --max-num-batched-tokens=3072
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      - --kv-cache-dtype=fp8
      - --calculate-kv-scales
      - --mamba-ssm-cache-dtype=bfloat16
      - --language-model-only
      - --disable-uvicorn-access-log
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
