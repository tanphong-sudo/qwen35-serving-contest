services:
  model:
    image: ghcr.io/tanphong-sudo/qwen35-adaptive@sha256:8a18315745a39d54085e1d99bfbb7e5ae55e5b6fb320132c7261abfa4dfc18db
    environment:
      VLLM_NO_USAGE_STATS: "1"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      PYTHONUNBUFFERED: "1"
      QWEN35_DECODE_WINDOW: "20"
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    command:
      - --model=/model
      - --served-model-name=Qwen3.5-2B
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=32768
      - --max-num-batched-tokens=2048
      - --scheduler-cls=qwen35_adaptive.scheduler.CompletionCohortAsyncScheduler
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --quantization=fp8
      - --mamba-ssm-cache-dtype=bfloat16
      - --language-model-only
      - --disable-uvicorn-access-log
    ports:
      - "8000:8000"
    shm_size: "2g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
