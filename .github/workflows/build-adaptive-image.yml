name: Build adaptive scheduler image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune --all --force

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build exact amd64 image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: custom_runtime/Dockerfile.adaptive
          platforms: linux/amd64
          load: true
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/qwen35-adaptive:${{ github.sha }}

      - name: Smoke test scheduler import
        run: |
          docker run --rm --platform linux/amd64 \
            --entrypoint python3 \
            ghcr.io/${{ github.repository_owner }}/qwen35-adaptive:${{ github.sha }} \
            -c 'from qwen35_adaptive.scheduler import CompletionCohortAsyncScheduler; from vllm.v1.core.sched.async_scheduler import AsyncScheduler; assert issubclass(CompletionCohortAsyncScheduler, AsyncScheduler)'

      - name: Push smoke-tested image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/qwen35-adaptive:${{ github.sha }}
          docker inspect \
            --format='{{index .RepoDigests 0}}' \
            ghcr.io/${{ github.repository_owner }}/qwen35-adaptive:${{ github.sha }} \
            | tee adaptive-image-digest.txt

      - uses: actions/upload-artifact@v4
        with:
          name: adaptive-image-digest
          path: adaptive-image-digest.txt
